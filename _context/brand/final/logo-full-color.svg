<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1000" width="2400" height="1000">
  <defs>
    <!-- 
      The mask creates a precise, transparent "halo" gap around the green checkmark 
      as it intersects the Navy 'B' and 'V', establishing the integrated geometry 
      requested in the brief without messy overlapping. 
    -->
    <mask id="checkmark-slice">
      <!-- Base: Everything visible -->
      <rect x="0" y="0" width="100%" height="100%" fill="white" />
      <!-- Cutout: Slightly thicker version of the checkmark stroke -->
      <path d="M 80 620 L 280 820 L 920 180 L 860 120 L 270 710 L 140 580 Z" 
            fill="black" 
            stroke="black" 
            stroke-width="28" 
            stroke-linejoin="round" />
    </mask>

    <style>
      .wordmark {
        font-family: 'Montserrat', 'Poppins', 'Gotham', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 800;
        font-size: 260px;
        letter-spacing: -0.01em;
        text-rendering: geometricPrecision;
      }
      .descriptor {
        font-family: 'Montserrat', 'Poppins', 'Gotham', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 500;
        font-size: 84px;
        letter-spacing: 0.05em;
        text-rendering: geometricPrecision;
      }
    </style>
  </defs>

  <!-- ========================================== -->
  <!-- SYMBOL LOCKUP (BV MONOGRAM)                -->
  <!-- ========================================== -->
  <g>
    <!-- Navy Letters (B & V) with masking applied to cut out the checkmark gap -->
    <g mask="url(#checkmark-slice)" fill="#0B2A43">
      
      <!-- Letter B (Custom Geometric Path) -->
      <path d="M 150 250 
               L 360 250 
               C 450 250, 460 300, 460 370 
               C 460 430, 430 470, 390 485 
               C 480 500, 490 550, 490 625 
               C 490 700, 460 750, 360 750 
               L 150 750 
               Z 
               M 250 340 
               V 460 
               L 350 460 
               C 380 460, 380 340, 350 340 
               Z 
               M 250 540 
               V 660 
               L 360 660 
               C 400 660, 400 540, 360 540 
               Z" />

      <!-- Letter V (Custom Geometric Path) -->
      <path d="M 510 250 
               L 620 250 
               L 690 550 
               L 760 250 
               L 870 250 
               L 740 750 
               L 640 750 
               Z" />
    </g>

    <!-- Green Integrated Checkmark / Progression Arrow -->
    <path d="M 80 620 
             L 280 820 
             L 920 180 
             L 860 120 
             L 270 710 
             L 140 580 
             Z" 
          fill="#2B9366" />
  </g>

  <!-- ========================================== -->
  <!-- TEXT LOCKUP                                -->
  <!-- ========================================== -->
  
  <!-- Wordmark -->
  <text x="1000" y="550" class="wordmark">
    <tspan fill="#0B2A43">Buscou</tspan><tspan fill="#2B9366">Viajou</tspan>
  </text>

  <!-- Descriptor -->
  <text x="1010" y="705" class="descriptor" fill="#0B2A43">
    Fretamento Inteligente
  </text>

</svg>
